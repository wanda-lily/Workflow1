name: tutorial
on: 
  push:
    branches:
      - dev

jobs:
  job1:
    name: job1
    runs-on: ubuntu-latest
    steps:
    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
    - name: check version of python
      run: python --version

  job2:
    name: job2
    runs-on: windows-latest
    steps:
    - name: step2
      run: |
        echo "hello from job2"
        date +'%d-%m-%Y' 

  job3:
    name: job3
    runs-on: ubuntu-latest
    steps:
    - name: step3
      run: |
        echo "hello from job3"
        date +'%d-%m-%Y'
  
  job4:
    name: job4
    needs: [job1, job2]
    runs-on: ubuntu-latest
    steps:
    - name: step4
      run: |
        echo "i am job4"
        date +'%d-%m-%Y'